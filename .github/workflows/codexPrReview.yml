name: Codex PR Review

# Reusable workflow that runs `openai/codex-action@v1` against a caller's PR
# and posts the model's review as a single PR comment.
#
# Spec: flow/codex-action-integration/spec (engram #193) — REQ-001..REQ-020.
# Design: flow/codex-action-integration/design (engram #194, #195).
# Plan: flow/codex-action-integration/plan (engram #196), Batch 1.
#
# Status: BATCH 1 in progress — full input/secret signature, ref resolution,
# sparse-checkout of default prompt, prompt-resolution precedence, comment
# footer + truncation. Default prompt FILE landed in Batch 2; README in Batch 3;
# optional Slack failure ping in Batch 4.
#
# Caller wiring example: see README.md "Codex PR Review" section.

on:
  workflow_call:
    inputs:
      # Required: which PR to review.
      pr_number:
        description: "Pull request number to review."
        required: true
        type: number
      # Optional inline prompt override. Wins over `prompt_file` and the baked
      # default per REQ-009 precedence.
      review_prompt:
        description: "Inline review prompt body. Wins over prompt_file + default."
        required: false
        type: string
        default: ""
      # Optional caller-side prompt path (resolved against the caller's checkout).
      prompt_file:
        description: "Path to prompt file inside the caller's repo."
        required: false
        type: string
        default: ""
      # Optional Codex model override (passes through to openai/codex-action@v1).
      model:
        description: "Codex model identifier (e.g., 'gpt-5'). Empty = action default."
        required: false
        type: string
        default: ""
    secrets:
      openai_api_key:
        description: "OpenAI API key used by openai/codex-action@v1."
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # 1. Resolve PR head + base SHAs via `gh pr view`.
      #
      # Caller passes only `pr_number`; the workflow resolves both refs from
      # the GitHub API. NO `continue-on-error` here — REQ-006 Scenario 3 +
      # REQ-010 mandate fail-fast on any resolution error.
      - name: Resolve PR refs
        id: refs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          pr_data=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json headRefOid,baseRefOid)
          head_sha=$(echo "$pr_data" | jq -r '.headRefOid')
          base_sha=$(echo "$pr_data" | jq -r '.baseRefOid')
          if [ -z "$head_sha" ] || [ "$head_sha" = "null" ]; then
            echo "::error::could not resolve head SHA for PR #${PR_NUMBER}"
            exit 1
          fi
          if [ -z "$base_sha" ] || [ "$base_sha" = "null" ]; then
            echo "::error::could not resolve base SHA for PR #${PR_NUMBER}"
            exit 1
          fi
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"
          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"

      # 2. Check out the caller repo at the resolved head SHA, full history.
      - name: Checkout caller at PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.refs.outputs.head_sha }}
          fetch-depth: 0

      # 3. Pre-fetch base + head refs so Codex can diff them locally (REQ-007).
      - name: Pre-fetch PR refs
        env:
          BASE_SHA: ${{ steps.refs.outputs.base_sha }}
          HEAD_SHA: ${{ steps.refs.outputs.head_sha }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_SHA" "$HEAD_SHA"

      # 4. Sparse second-checkout of the ReusableWorkflow repo to fetch the
      # default review prompt at the same ref the caller resolved when it
      # invoked this workflow (REQ-008, TR-1).
      #
      # Pinning to `github.workflow_sha` keeps the prompt and the workflow
      # logic in lockstep — a caller that pinned `@v1.2.3` gets the prompt
      # bundled with v1.2.3, not the latest `main`. The `|| github.sha`
      # fallback covers the rare case where `workflow_sha` is empty (TR-1
      # mitigation — happens when the reusable is dispatched directly).
      #
      # Sparse-checkout limits the fetch to a single file, ~50ms vs full
      # repo clone. `cone-mode: false` is required because we want a single
      # file path, not a directory cone.
      #
      # Skipped when the caller passes `review_prompt` (inline override) —
      # that path doesn't need the default file. We still run when only
      # `prompt_file` is passed, because that file may not exist and the
      # fail-fast (REQ-010) is more informative when the default is also
      # available as a comparison reference. (Cheap; ~1MB, sub-second.)
      - name: Sparse checkout default prompt
        if: ${{ inputs.review_prompt == '' }}
        uses: actions/checkout@v4
        with:
          repository: Keiron-HealthTech/ReusableWorkflow
          # fallback to github.sha when workflow_sha is empty (TR-1)
          ref: ${{ github.workflow_sha || github.sha }}
          path: .codex-defaults
          sparse-checkout: |
            .github/codex/pr-review.prompt.md
          sparse-checkout-cone-mode: false

      # 5. Resolve the effective review prompt by precedence (REQ-009):
      #
      #   inline review_prompt   (highest)
      #   > caller-side prompt_file
      #   > baked default at .codex-defaults/.github/codex/pr-review.prompt.md
      #
      # The step emits TWO outputs — exactly one will be non-empty per run:
      #   - effective_prompt_inline : prompt body to feed via `prompt:`
      #   - effective_prompt_file   : path to feed via `prompt-file:`
      #
      # The inline output uses a heredoc-safe `<<EOF_PROMPT` form so multiline
      # prompts containing newlines, backticks, or `$` survive the trip
      # through `$GITHUB_OUTPUT` intact (GitHub Actions documented form).
      #
      # NO `continue-on-error` here — REQ-010 mandates fail-fast when the
      # resolved source is missing, with `::error::` annotations naming the
      # offending path so operators can fix the caller config quickly.
      - name: Resolve effective prompt
        id: prompt
        env:
          INPUT_REVIEW_PROMPT: ${{ inputs.review_prompt }}
          INPUT_PROMPT_FILE: ${{ inputs.prompt_file }}
        run: |
          set -euo pipefail
          DEFAULT_PROMPT=".codex-defaults/.github/codex/pr-review.prompt.md"
          if [ -n "$INPUT_REVIEW_PROMPT" ]; then
            # Inline override wins. Pass via heredoc-safe output.
            {
              echo "effective_prompt_inline<<EOF_PROMPT"
              printf '%s\n' "$INPUT_REVIEW_PROMPT"
              echo "EOF_PROMPT"
              echo "effective_prompt_file="
            } >> "$GITHUB_OUTPUT"
            echo "resolved prompt: inline review_prompt input"
          elif [ -n "$INPUT_PROMPT_FILE" ]; then
            # Caller-supplied path inside their checkout.
            if [ ! -f "$INPUT_PROMPT_FILE" ]; then
              echo "::error::prompt_file '${INPUT_PROMPT_FILE}' not found in caller checkout"
              exit 1
            fi
            {
              echo "effective_prompt_inline="
              echo "effective_prompt_file=${INPUT_PROMPT_FILE}"
            } >> "$GITHUB_OUTPUT"
            echo "resolved prompt: caller prompt_file=${INPUT_PROMPT_FILE}"
          else
            # Baked default from sparse second-checkout.
            if [ ! -f "$DEFAULT_PROMPT" ]; then
              echo "::error::default prompt '${DEFAULT_PROMPT}' missing — sparse checkout failed or file deleted at workflow ref"
              exit 1
            fi
            {
              echo "effective_prompt_inline="
              echo "effective_prompt_file=${DEFAULT_PROMPT}"
            } >> "$GITHUB_OUTPUT"
            echo "resolved prompt: ${DEFAULT_PROMPT} (baked default)"
          fi

      # 6. Run Codex with a hardcoded one-line prompt.
      #
      # Tracer scope (will be replaced in Task 1.6 with resolved prompt
      # outputs from the prompt-resolution step added in Task 1.5).
      - name: Run Codex
        id: codex
        uses: openai/codex-action@v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.openai_api_key }}
          prompt: "Review this PR for obvious issues."
          sandbox: read-only
          safety-strategy: drop-sudo

      # 5. Post the Codex final-message as a PR comment.
      #
      # Final-message is passed via env (NOT direct ${{ }} interpolation
      # into the script body) to neutralize any code-injection risk if
      # Codex output ever contains JS string-terminating characters.
      - name: Post PR comment
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const codexOutput = process.env.CODEX_FINAL_MESSAGE || '';
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const body = codexOutput.trim().length > 0
              ? codexOutput
              : '_Codex returned no output for this run._';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });
